<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sticky Notes</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <textarea id="editor" spellcheck="false"></textarea>
    <div id="titlebar" data-tauri-drag-region>
      <span id="title-text"></span>
      <button id="btn-pin">
        <svg class="pin-icon pin-inactive" width="10" height="12" viewBox="0 0 10 12">
          <path d="M5 1C3.5 1 3 2 3 3v2.5L1 7.5v1h8v-1L7 5.5V3c0-1-.5-2-2-2z" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linejoin="round"/>
          <path d="M4.5 8v2.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
        <svg class="pin-icon pin-active" width="10" height="12" viewBox="0 0 10 12">
          <path d="M5 1C3.5 1 3 2 3 3v2.5L1 7.5v1h8v-1L7 5.5V3c0-1-.5-2-2-2z" stroke="currentColor" stroke-width="1.3" fill="currentColor" stroke-linejoin="round"/>
          <path d="M4.5 8v2.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
      </button>
      <button id="btn-minimize">
        <svg width="10" height="10" viewBox="0 0 10 10">
          <path d="M2 5h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
      <button id="btn-close">
        <svg width="10" height="10" viewBox="0 0 10 10">
          <path d="M1 1l8 8M9 1l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
