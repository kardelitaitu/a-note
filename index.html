<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sticky Notes</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <textarea id="editor" spellcheck="false"></textarea>
    <div id="titlebar" data-tauri-drag-region>
      <span id="title-text"></span>
      <div id="menu-area">
        <button id="btn-menu" title="Menu">
          <svg width="12" height="12" viewBox="0 0 12 12">
            <path d="M2 3h8M2 6h8M2 9h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
        <div id="menu-dropdown">
          <button id="menu-wordwrap">
            <span class="menu-check"></span>
            <span>Word wrap</span>
          </button>
          <div class="menu-sep"></div>
          <div class="menu-label">Theme</div>
          <div id="menu-themes"></div>
        </div>
      </div>
      <button id="btn-pin" title="Always on top">
        <svg class="pin-icon pin-inactive" width="12" height="12" viewBox="0 0 32 32">
          <g transform="rotate(45 16 16)">
            <path d="M25,13c0,8-9,15-9,15s-9-7-9-15c0-5,4-9,9-9S25,8,25,13z" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
            <circle cx="16" cy="13" r="3" stroke="currentColor" stroke-width="2" fill="none"/>
          </g>
        </svg>
        <svg class="pin-icon pin-active" width="12" height="12" viewBox="0 0 32 32">
          <g transform="rotate(45 16 16)">
            <path d="M25,13c0,8-9,15-9,15s-9-7-9-15c0-5,4-9,9-9S25,8,25,13z" stroke="currentColor" stroke-width="2" fill="currentColor" stroke-linejoin="round" stroke-linecap="round"/>
            <circle cx="16" cy="13" r="3" stroke="currentColor" stroke-width="2" fill="currentColor"/>
          </g>
        </svg>
      </button>
      <button id="btn-minimize" title="Minimize">
        <svg width="10" height="10" viewBox="0 0 10 10">
          <path d="M2 5h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
      <button id="btn-close" title="Close">
        <svg width="10" height="10" viewBox="0 0 10 10">
          <path d="M1 1l8 8M9 1l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
